modules:
  jira:issuePanel:
    - key: findic-ai-demo-hello-world-issue-panel
      resource: main
      resolver:
        function: resolver
      render: native
      title: Reflection
      icon: src/res/findic.svg
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main
    path: src/frontend/index.jsx
#  - key: findic-icon
#    path: src/res/findic.svg
permissions:
  scopes:
    - 'read:jira-work'
  external:
    fetch:
      backend:
        - address: 'https://api.openai.com'
app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/658a2af7-6594-4531-9456-5de813de470d
